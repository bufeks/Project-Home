name: Fast watch (新着最速検知)

# ウォッチ（住みたいエリア・気になるマンション）の対象区だけを日中2時間毎に軽量チェックし、
# 新着のウォッチ該当物件を data/watch_alerts.json に追記する。全域スクレイプは日次(update-listings)のまま。
# 手動実行(workflow_dispatch)も可。

on:
  schedule:
    - cron: "0 0,2,4,6,8,10,12 * * *"   # JST 9,11,13,15,17,19,21時
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fast-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fast watch check
        run: python3 tokyo-land-research/scripts/fast_watch.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain tokyo-land-research/data/watch_alerts.json tokyo-land-research/data/seen_watch.json)" ]; then
            git add tokyo-land-research/data/watch_alerts.json tokyo-land-research/data/seen_watch.json
            git commit -m "chore: fast-watch alerts ($(date -u +%Y-%m-%dT%H:%MZ))"
            for i in 1 2 3 4 5; do git push && break || { git pull --rebase -X ours; sleep 3; }; done
          else
            echo "No new watch alerts."
          fi
